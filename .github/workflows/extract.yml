# Disabled: repository archived May 2026. Successor: https://github.com/mpburton812/gender_reveal_media
name: Media Extraction Pipeline

on:
  workflow_dispatch:      # Manual trigger only (repo archived; schedule removed)
    inputs:
      limit:
        description: 'Number of episodes to process (e.g., 252 for entire history)'
        required: true
        default: '20'
      backfill:
        description: 'Check this to re-process and enrich existing episodes'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Run Extraction
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          LIMIT="${{ github.event.inputs.limit || '20' }}"
          BACKFILL="${{ github.event.inputs.backfill == 'true' && '--backfill' || '' }}"
          python extract_media.py --limit $LIMIT $BACKFILL

      - name: Prepare Email Summary
        if: always()
        run: |
          # Extract the last summary block from the performance log
          sed -n '/--- EXECUTION SUMMARY ---/,$p' performance_log.txt > current_summary.txt

      - name: Send Summary Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Gender Reveal Media Pipeline Update"
          to: mpburton@gmail.com
          from: Gender Reveal Automation <mpburton@gmail.com>
          body: file://current_summary.txt

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git config --global advice.addIgnoredFile false
          echo "Current status before staging:"
          git status
          
          # Force add files individually to see which one fails
          git add -f pipeline_state.json
          git add -f extracted_media.csv
          git add -f performance_log.txt
          git add -f error_log.txt
          
          echo "Status after force staging:"
          git status
          
          if git diff --staged --quiet; then
            echo "No changes detected to commit."
          else
            git commit -m "Automated Media Update [$(date +'%Y-%m-%d')]"
            git push origin main
          fi
